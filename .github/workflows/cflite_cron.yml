name: ClusterFuzzLite Maintenance

on:
  schedule:
    # Run daily at 2am UTC for corpus pruning
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  corpus-pruning:
    name: Corpus Pruning
    runs-on: self-hosted

    steps:
      - name: Configure Docker API compatibility
        run: |
          sudo mkdir -p /etc/systemd/system/docker.service.d
          printf '[Service]\nEnvironment="DOCKER_MIN_API_VERSION=1.41"\n' | sudo tee /etc/systemd/system/docker.service.d/api-compat.conf
          sudo systemctl daemon-reload
          sudo systemctl restart docker

      - name: Build Fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          language: rust
          sanitizer: address

      - name: Run Corpus Pruning
        id: prune
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 60
          mode: 'prune'
          sanitizer: address

  coverage:
    name: Coverage Report
    runs-on: self-hosted
    needs: corpus-pruning

    steps:
      - name: Configure Docker API compatibility
        run: |
          sudo mkdir -p /etc/systemd/system/docker.service.d
          printf '[Service]\nEnvironment="DOCKER_MIN_API_VERSION=1.41"\n' | sudo tee /etc/systemd/system/docker.service.d/api-compat.conf
          sudo systemctl daemon-reload
          sudo systemctl restart docker

      - name: Build Fuzzers (Coverage)
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          language: rust
          sanitizer: coverage

      - name: Run Coverage
        id: coverage
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 60
          mode: 'coverage'
          sanitizer: coverage
