name: Kani Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  kani-config:
    name: Config & Constants
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify CryptoConfig properties
        run: |
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_config_new_clamps_to_minimums
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_config_fast_is_faster
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_config_paranoid_is_stronger
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_no_parameter_overflow
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_config_security_ordering
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_config_new_preserves_above_minimum
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_config_new_monotonic

  kani-nonce:
    name: Nonce Safety (Critical)
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # CRITICAL: Nonce uniqueness verification for streaming encryption
      # Nonce reuse in AES-GCM is catastrophic - it breaks authentication and allows key recovery
      - name: Verify streaming nonce safety
        run: |
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_nonce_uniqueness_different_indices
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_counter_injection
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_nonce_structure
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_nonce_length
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_max_file_size_bound
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_sequential_nonce_uniqueness
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_zero_index_valid
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_max_index_valid

  kani-aes-gcm:
    name: AES-GCM Encryption
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify AES-GCM properties
        run: |
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_encrypt_length
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_encrypt_no_panic
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_encrypt_rejects_invalid_nonce
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_roundtrip
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_authentication
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_decrypt_length
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_nonce_len
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_aes_gcm_no_overflow
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_decrypt_minimum_length

  kani-kdf:
    name: Key Derivation
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify KDF properties
        run: |
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_key_length
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_determinism
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_no_panic
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_salt_uniqueness
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_password_uniqueness
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_salt_generation
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_config_validity
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_kdf_no_overflow
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_empty_password
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_short_salt
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_large_inputs

  kani-memory:
    name: Memory Protection
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify memory protection properties
        run: |
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_custom_pattern_value
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_custom_pattern_uniqueness
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_allocation_size_bounds
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_pool_stats_no_overflow
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_security_level_ordering
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_zero_scrub_result
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_custom_scrub_result
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_dod_scrub_passes
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_ones_scrub_result
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_nist_scrub_result
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_paranoid_scrub_passes
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_custom_byte_scrub_result
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_scrub_and_verify_always_true

  kani-volume:
    name: Volume Header
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify volume header properties
        run: |
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_yubikey_flag_operations
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_flags_are_single_nonoverlapping_bits
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_keyfile_flag_operations
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_flag_independence
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_sector_size_bounds
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_volume_size_no_overflow
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_pq_metadata_size_bounds
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_data_offset_alignment
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_has_pqc_logic
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_requires_yubikey_on_header
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_requires_keyfile_on_header
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_pq_algorithm_getter
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_version_getter_consistency
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_pq_metadata_no_overlap

  kani-daemon:
    name: Daemon IPC Protocol
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify daemon protocol properties
        run: |
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_dead_man_status_types
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_mount_info_timestamp_bounds
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_dead_man_status_no_overflow
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_hex_encoding_length_symbolic
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_security_constant_minimum_entropy
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_dead_man_timeout_ordering
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_seconds_remaining_computation
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_mount_uptime_safe

      - name: Verify daemon auth properties
        run: |
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_token_generation_length
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_token_hex_format
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_validation_length_check
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_constant_time_precondition
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_challenge_response_security
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_server_identity_domain_separation
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_keyed_hash_output_size
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_path_length_bounds
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_auth_error_discrimination

  kani-keyslot:
    name: Key Slot Management
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify keyslot properties
        run: |
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_max_key_slots
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_master_key_size
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_encrypted_key_size
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_slot_index_bounds
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_active_count_bounds
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_salt_size
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_nonce_size
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_keyslot_struct_size
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_find_free_slot_result
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_duress_detection_boolean
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_destruction_completeness
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_password_change_slot_preservation
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_derived_key_size
          cargo kani --lib --no-default-features --features "post-quantum,compression" --harness verify_slot_invariant
